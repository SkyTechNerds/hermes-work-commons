# Notify Discord (Hermes-Work v3) für ha-soft-presence
# Pattern: hermes-work-commons v3 mit trigger_prefix für HA-Bot
# Secret DISCORD_WEBHOOK_URL muss im Repo gesetzt sein (auf #ha-soft-presence-qa zeigen)

name: Notify Testing Agent

on:
  pull_request:
    types: [opened, synchronize, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: SkyTechNerds/hermes-work-commons@v3
        with:
          discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          trigger_prefix: 'TEST_REQUEST'