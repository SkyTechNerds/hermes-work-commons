name: 'Notify Discord (Hermes-Work)'

description: >
  Sendet eine Webhook-Message nach Discord wenn ein PR geöffnet/aktualisiert
  wird oder ein Kommentar gepostet wird (inkl. Replies auf Inline-Review-Kommentare).
  Macht KEINE Tests selbst. Der Hermes-Bot reagiert auf die Discord-Message.

inputs:
  discord_webhook_url:
    description: 'Discord-Webhook-URL (Repo-Secret, projektspezifisch)'
    required: true
    default: ''
  trigger_prefix:
    description: 'Footer-Prefix für die Bot-Trigger-Erkennung. Default PR_READY, JUMO nutzt JUMO_TEST_REQUEST.'
    required: false
    default: 'PR_READY'

runs:
  using: composite
  steps:
    - name: Build & post Discord notification
      env:
        DISCORD_WEBHOOK_URL: ${{ inputs.discord_webhook_url }}
        TRIGGER_PREFIX: ${{ inputs.trigger_prefix }}
        EVENT_NAME: ${{ github.event_name }}
        REPO_FULL: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.number || github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_SENDER: ${{ github.event.sender.login }}
        PR_HEAD: ${{ github.head_ref }}
        PR_BASE: ${{ github.base_ref }}
        PR_COMMIT: ${{ github.event.pull_request.head.sha }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        COMMENT_ID: ${{ github.event.comment.id }}
        COMMENT_PATH: ${{ github.event.comment.path }}
        IN_REPLY_TO: ${{ github.event.comment.in_reply_to_id }}
      shell: bash
      run: |
        if [ -z "$DISCORD_WEBHOOK_URL" ]; then
          echo "::error::DISCORD_WEBHOOK_URL ist nicht gesetzt"
          exit 0
        fi

        case "$EVENT_NAME" in
          pull_request)
            CONTENT="${TRIGGER_PREFIX} repo=${REPO_FULL} pr=${PR_NUMBER} branch=${PR_HEAD}"
            PAYLOAD=$(jq -n \
              --arg pr "#${PR_NUMBER}" \
              --arg title "$PR_TITLE" \
              --arg merge "${PR_HEAD} → ${PR_BASE}" \
              --arg sender "$PR_SENDER" \
              --arg commit "${PR_COMMIT:0:7}" \
              --arg url "$PR_URL" \
              --arg repo "$REPO_FULL" \
              --arg branch "$PR_HEAD" \
              --arg prnum "$PR_NUMBER" \
              --arg trigger "$TRIGGER_PREFIX" \
              '{
                "content": ($trigger + " repo=" + $repo + " pr=" + $prnum + " branch=" + $branch),
                "embeds": [{
                  "title": "🧪 Neuer PR offen / aktualisiert",
                  "color": 5814783,
                  "fields": [
                    { "name": "PR", "value": $pr, "inline": true },
                    { "name": "Ersteller", "value": $sender, "inline": true },
                    { "name": "Commit", "value": $commit, "inline": true },
                    { "name": "Titel", "value": $title, "inline": false },
                    { "name": "Branch", "value": $merge, "inline": false },
                    { "name": "Link", "value": $url, "inline": false }
                  ],
                  "footer": { "text": ($trigger + " repo=" + $repo + " pr=" + $prnum) }
                }]
              }')
            ;;

          issue_comment)
            CONTENT="${TRIGGER_PREFIX}_COMMENT repo=${REPO_FULL} pr=${PR_NUMBER}"
            PAYLOAD=$(jq -n \
              --arg repo "$REPO_FULL" \
              --arg prnum "$PR_NUMBER" \
              --arg author "$COMMENT_AUTHOR" \
              --arg body "$COMMENT_BODY" \
              --arg trigger "$TRIGGER_PREFIX" \
              '{
                "content": ($trigger + "_COMMENT repo=" + $repo + " pr=" + $prnum),
                "embeds": [{
                  "title": ("💬 Neuer Kommentar auf PR #" + $prnum),
                  "color": 16776960,
                  "fields": [
                    { "name": "Author", "value": $author, "inline": true },
                    { "name": "Repo", "value": $repo, "inline": true },
                    { "name": "PR", "value": ("#" + $prnum), "inline": true },
                    { "name": "Text", "value": ($body[0:500]), "inline": false }
                  ],
                  "footer": { "text": ($trigger + "_COMMENT repo=" + $repo + " pr=" + $prnum) }
                }]
              }')
            ;;

          pull_request_review_comment)
            # Nur ECHTE Replies weiterleiten (in_reply_to_id gesetzt) — NICHT die initialen
            # Inline-Findings (kein in_reply_to_id), sonst triggert jedes eigene Finding sich selbst.
            if [ -z "$IN_REPLY_TO" ] || [ "$IN_REPLY_TO" = "null" ]; then
              echo "::notice::Inline-Finding (kein Reply) — kein Webhook"
              exit 0
            fi
            CONTENT="${TRIGGER_PREFIX}_REVIEW_REPLY repo=${REPO_FULL} pr=${PR_NUMBER} comment=${COMMENT_ID}"
            PAYLOAD=$(jq -n \
              --arg repo "$REPO_FULL" \
              --arg prnum "$PR_NUMBER" \
              --arg author "$COMMENT_AUTHOR" \
              --arg body "$COMMENT_BODY" \
              --arg path "$COMMENT_PATH" \
              --arg cid "$COMMENT_ID" \
              --arg trigger "$TRIGGER_PREFIX" \
              '{
                "content": ($trigger + "_REVIEW_REPLY repo=" + $repo + " pr=" + $prnum + " comment=" + $cid),
                "embeds": [{
                  "title": ("↩️ Reply auf Review-Kommentar (PR #" + $prnum + ")"),
                  "color": 10181046,
                  "fields": [
                    { "name": "Author", "value": $author, "inline": true },
                    { "name": "Datei", "value": $path, "inline": true },
                    { "name": "Text", "value": ($body[0:500]), "inline": false }
                  ],
                  "footer": { "text": ($trigger + "_REVIEW_REPLY repo=" + $repo + " pr=" + $prnum + " comment=" + $cid) }
                }]
              }')
            ;;

          *)
            echo "::notice::Unbekannter Event: $EVENT_NAME — kein Webhook"
            exit 0
            ;;
        esac

        echo "Sende: $CONTENT"
        curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
        || echo "::warning::Discord-Webhook fehlgeschlagen (non-fatal)"
