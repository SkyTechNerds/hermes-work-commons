name: 'hermes-work-commons'
description: 'Shared PR-test suite with standard 6-check set'
inputs:
  enable_visual_snapshot:
    description: 'Enable visual snapshot checks'
    required: false
    default: 'false'
  enable_code_review:
    description: 'Auto-generate code review hints on new PRs'
    required: false
    default: 'true'
  base_branch:
    description: 'Base branch for diff'
    required: false
    default: 'main'
  extra_linters:
    description: 'Comma-separated list of additional linters to install'
    required: false
    default: ''
  discord_webhook_url:
    description: 'Discord webhook URL (optional)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup tools
      env:
        EXTRA_LINTERS: ${{ inputs.extra_linters }}
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq yamllint jq gh
        sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq
        # Make check scripts executable
        sudo chmod +x "${{ github.action_path }}/checks/"*.sh
        if echo "$EXTRA_LINTERS" | grep -q ruff; then
          pip install --quiet ruff
        fi
        if echo "$EXTRA_LINTERS" | grep -q eslint; then
          npm install -g eslint 2>/dev/null || true
        fi

    - name: Fetch PR head
      env:
        HEAD_REF: ${{ github.head_ref }}
      shell: bash
      run: |
        git fetch --depth=1 origin "$HEAD_REF"
        git checkout --quiet FETCH_HEAD

    - name: Secret-Scan
      id: secrets
      shell: bash
      run: ${{ github.action_path }}/checks/secret-scan.sh

    - name: Diff-Size
      id: diff
      shell: bash
      run: ${{ github.action_path }}/checks/diff-size.sh

    - name: Lint
      id: lint
      shell: bash
      run: ${{ github.action_path }}/checks/lint.sh

    - name: Path-Convention
      id: paths
      shell: bash
      run: ${{ github.action_path }}/checks/path-convention.sh

    - name: Review-Coverage
      id: reviews
      shell: bash
      run: ${{ github.action_path }}/checks/review-coverage.sh
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Code-Review
      id: code-review
      if: inputs.enable_code_review == 'true'
      shell: bash
      run: ${{ github.action_path }}/checks/code-review.sh

    - name: Mirror to Discord
      if: always() && inputs.discord_webhook_url != ''
      shell: bash
      run: ${{ github.action_path }}/checks/discord-mirror.sh
      env:
        DISCORD_WEBHOOK_URL: ${{ inputs.discord_webhook_url }}

    - name: Post QA Report
      if: always()
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_FULL: ${{ github.repository }}
        HEAD_REF: ${{ github.head_ref }}
        BASE_REF: ${{ github.base_ref }}
        STATUS_SECRETS: ${{ steps.secrets.outputs.status }}
        STATUS_DIFF: ${{ steps.diff.outputs.status }}
        STATUS_LINT: ${{ steps.lint.outputs.status }}
        STATUS_PATHS: ${{ steps.paths.outputs.status }}
        STATUS_REVIEWS: ${{ steps.reviews.outputs.status }}
        STATUS_CODE_REVIEW: ${{ steps.code-review.outputs.status }}
      shell: bash
      run: ${{ github.action_path }}/scripts/post-report.sh
